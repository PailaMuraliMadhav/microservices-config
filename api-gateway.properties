spring.application.name=API-GATEWAY
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# 1. Correct the property path (Remove .server.webflux)
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USERSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**
# 2. Add the filter to strip the "/users" prefix
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/users/(?<segment>.*), /$\{segment}

# Route for DOCTORSERVICE
spring.cloud.gateway.routes[1].id=doctor-service
spring.cloud.gateway.routes[1].uri=lb://DOCTORSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/doctors/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/doctors/(?<segment>.*), /$\{segment}

# Logging and Tracing
logging.level.org.springframework.cloud.gateway=DEBUG
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
